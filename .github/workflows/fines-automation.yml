name: Fines automation

on:
  schedule:
    # Every 5 minutes — no-vote fines, vote reminders, weekly late fees
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: fines-automation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Verify repository secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing GitHub Actions secrets. Add VITE_SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY under Settings → Secrets and variables → Actions (same values as .env.local / DDSFL sync workflow)."
            exit 1
          fi

      - name: Run fines scheduler
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FINES_SCHEDULER_SECRET: ${{ secrets.FINES_SCHEDULER_SECRET }}
        run: npm run fines:automation
