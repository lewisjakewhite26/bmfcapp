name: Sync DDSFL to Supabase

on:
  schedule:
    # Sunday 20:00 UTC — after typical DDSFL Sunday fixtures (21:00 BST in summer)
    - cron: '0 20 * * 0'
  workflow_dispatch:

concurrency:
  group: sync-ddsfl
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape DDSFL and upsert into Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run sync:ddsfl
